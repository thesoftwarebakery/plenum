overlay: 1.1.0
info:
  title: Upstream config with typo in field name (should cause startup failure)
  version: 1.0.0
actions:
  - target: $
    update:
      components:
        x-upstreams:
          default:
            kind: "HTTP"
            address: "wiremock"
            port: 8080
            buffer-responce: true
  - target: $.paths[*]
    update:
      x-plenum-upstream:
        $ref: "#/components/x-upstreams/default"
