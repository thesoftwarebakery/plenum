overlay: 1.1.0
info:
  title: MySQL plugin upstream config
  version: 1.0.0
actions:
  - target: $
    update:
      x-plenum-config:
        threads: 1
        daemon: false
        listen: "0.0.0.0:6188"
      components:
        x-upstreams:
          db:
            kind: "plugin"
            plugin: "internal:mysql"
            options:
              host: "${{ env.DB_HOST }}"
              port: "${{ env.DB_PORT }}"
              database: "${{ env.DB_NAME }}"
              user: "${{ env.DB_USER }}"
              password: "${{ env.DB_PASSWORD }}"
            permissions:
              net:
                - "${{ env.DB_HOST }}"
  - target: $.paths[*]
    update:
      x-plenum-upstream:
        $ref: "#/components/x-upstreams/db"
  - target: $.paths['/users'].get
    update:
      x-plenum-backend:
        query: "SELECT id, name, created_at FROM users ORDER BY id"
        fields:
          created_at: "createdAt"
  - target: $.paths['/users/{id}'].get
    update:
      x-plenum-backend:
        query: "SELECT id, name, created_at FROM users WHERE id = ?"
        params:
          - "${{path.id}}"
        fields:
          created_at: "createdAt"
        returns: "/0"
  - target: $.paths['/users'].post
    update:
      x-plenum-backend:
        query: "INSERT INTO users (name, created_at) VALUES (?, NOW())"
        params:
          - "${{body.name}}"
  - target: $.paths['/users/{id}'].put
    update:
      x-plenum-backend:
        query: "UPDATE users SET name = ? WHERE id = ?"
        params:
          - "${{body.name}}"
          - "${{path.id}}"
  - target: $.paths['/users/{id}'].delete
    update:
      x-plenum-backend:
        query: "DELETE FROM users WHERE id = ?"
        params:
          - "${{path.id}}"
