overlay: 1.1.0
info:
  title: Rate limit log-only test overlay
  version: 1.0.0
actions:
  - target: $
    update:
      x-plenum-config:
        listen: "0.0.0.0:6188"
        threads: 1
      components:
        x-upstreams:
          default:
            kind: "HTTP"
            address: "wiremock"
            port: 8080
  - target: $.paths[*]
    update:
      x-plenum-upstream:
        $ref: "#/components/x-upstreams/default"
      x-plenum-rate-limit:
        identifier: "${{ header.x-api-key }}"
        window: "60s"
        limit: 3
        enforce: false
  - target: $.paths['/items'].get
    update:
      x-plenum-interceptor:
        - module: "./interceptors/read-rate-limit.js"
          hook: on_response
          function: readRateLimit
