overlay: 1.1.0
info:
  title: Wire upstream for validation tests
  version: 1.0.0
actions:
  - target: $
    update:
      x-plenum-config:
        threads: 1
        daemon: false
        listen: "0.0.0.0:6188"
      x-plenum-upstreams:
        default:
          kind: "HTTP"
          address: "wiremock"
          port: 8080
  - target: $.paths[*]
    update:
      x-plenum-upstream:
        $ref: "#/x-plenum-upstreams/default"
