overlay: 1.1.0
info:
  title: Attach interceptor with validate() that passes
  version: 1.0.0
actions:
  - target: $.paths[*].get
    update:
      x-plenum-interceptor:
        - module: "./interceptors/validate_options.js"
          hook: on_request
          function: onRequest
          options:
            required_key: "value"
