overlay: 1.1.0
info:
  title: Plugin upstream with validate() that passes
  version: 1.0.0
actions:
  - target: $.paths[*]
    update:
      x-plenum-upstream:
        kind: "plugin"
        plugin: "./plugins/validate_echo.js"
  - target: $.paths['/echo'].get
    update:
      x-plenum-backend:
        table: users
  - target: $.paths['/echo'].post
    update:
      x-plenum-backend:
        table: users
  - target: $.paths['/echo/{id}'].get
    update:
      x-plenum-backend:
        table: users
