overlay: 1.1.0
info:
  title: Attach all-hooks interceptor
  version: 1.0.0
actions:
  - target: $.paths[*].get
    update:
      x-opengateway-interceptor:
        - module: "./interceptors/all-hooks.js"
          hook: on_request
          function: onRequest
        - module: "./interceptors/all-hooks.js"
          hook: before_upstream
          function: beforeUpstream
        - module: "./interceptors/all-hooks.js"
          hook: on_response
          function: onResponse
