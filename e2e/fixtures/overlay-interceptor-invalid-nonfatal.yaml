overlay: 1.1.0
info:
  title: Attach invalid-return interceptor (before_upstream and on_response)
  version: 1.0.0
actions:
  - target: $.paths[*].get
    update:
      x-plenum-interceptor:
        - module: "./interceptors/invalid-return.js"
          hook: before_upstream
          function: beforeUpstream
        - module: "./interceptors/invalid-return.js"
          hook: on_response
          function: onResponse
