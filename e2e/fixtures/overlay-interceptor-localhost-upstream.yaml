overlay: 1.1.0
info:
  title: Wire upstream to localhost (IP address, no DNS resolution)
  version: 1.0.0
actions:
  - target: $
    update:
      x-opengateway-config:
        listen: "0.0.0.0:6188"
      x-opengateway-upstreams:
        default:
          kind: "HTTP"
          address: "127.0.0.1"
          port: 8080
  - target: $.paths[*]
    update:
      x-opengateway-upstream:
        $ref: "#/x-opengateway-upstreams/default"
