overlay: 1.1.0
info:
  title: Plugin upstream config
  version: 1.0.0
actions:
  - target: $.paths[*]
    update:
      x-plenum-upstream:
        kind: "plugin"
        plugin: "./plugins/echo.js"
  - target: $.paths['/echo'].get
    update:
      x-plenum-backend:
        table: echo
        query: list
  - target: $.paths['/echo/{id}'].get
    update:
      x-plenum-backend:
        table: echo
        query: get_by_id
