overlay: 1.1.0
info:
  title: Plugin upstream config
  version: 1.0.0
actions:
  - target: $.paths[*]
    update:
      x-opengateway-upstream:
        kind: "plugin"
        plugin: "./plugins/echo.js"
  - target: $.paths['/echo'].get
    update:
      x-opengateway-backend:
        operation: "listEcho"
  - target: $.paths['/echo/{id}'].get
    update:
      x-opengateway-backend:
        operation: "echoById"
