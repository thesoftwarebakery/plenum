openapi: 3.1.0
info:
  title: Interceptor Body Test API
  version: 1.0.0
paths:
  /products:
    get:
      operationId: listProducts
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: object
    post:
      operationId: createProduct
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Created product
          content:
            application/json:
              schema:
                type: object
