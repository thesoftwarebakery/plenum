overlay: 1.1.0
info:
  title: Plugin upstream config with env var set via container environment
  version: 1.0.0
actions:
  - target: $.paths[*]
    update:
      x-plenum-upstream:
        kind: "plugin"
        plugin: "./plugins/echo.js"
        options:
          host: "${{ env.PLENUM_TEST_HOST }}"
