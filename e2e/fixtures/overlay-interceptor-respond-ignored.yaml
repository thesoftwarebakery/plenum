overlay: 1.1.0
info:
  title: Attach respond-ignored interceptor
  version: 1.0.0
actions:
  - target: $.paths[*].get
    update:
      x-plenum-interceptor:
        - module: "./interceptors/respond-ignored.js"
          hook: before_upstream
          function: beforeUpstream
        - module: "./interceptors/respond-ignored.js"
          hook: on_response
          function: onResponse
