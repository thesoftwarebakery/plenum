overlay: 1.1.0
info:
  title: Attach modify-response-body interceptor to GET /products
  version: 1.0.0
actions:
  - target: $.paths[*].get
    update:
      x-opengateway-interceptor:
        - module: "./interceptors/modify-response-body.js"
          hook: on_response_body
          function: onResponseBody
