overlay: 1.1.0
info:
  title: Attach options-echo interceptor
  version: 1.0.0
actions:
  - target: $.paths[*].get
    update:
      x-plenum-interceptor:
        - module: "./interceptors/options-echo.js"
          hook: on_request
          function: echoOptions
          options:
            role: "admin"
            permissions:
              - read
              - write
            settings:
              timeout: 5000
              retry: true