overlay: 1.1.0
info:
  title: Attach validate-request interceptor (no explicit schema, uses $ref from spec)
  version: 1.0.0
actions:
  - target: $.paths["/items"].post
    update:
      x-plenum-interceptor:
        - module: "internal:validate-request"
          hook: "on_request"
          function: "validateRequest"
