overlay: 1.1.0
info:
  title: Ctx bag test — two interceptors sharing state via ctx
  version: 1.0.0
actions:
  - target: $
    update:
      x-plenum-config:
        listen: "0.0.0.0:6188"
      components:
        x-upstreams:
          default:
            kind: "HTTP"
            address: "wiremock"
            port: 8080
  - target: $.paths[*]
    update:
      x-plenum-upstream:
        $ref: "#/components/x-upstreams/default"
  - target: $.paths['/products'].get
    update:
      x-plenum-interceptor:
        - module: "./interceptors/set-ctx.js"
          hook: on_request
          function: setCtx
        - module: "./interceptors/read-ctx.js"
          hook: on_response
          function: readCtx
