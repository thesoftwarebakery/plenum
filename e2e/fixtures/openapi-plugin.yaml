openapi: 3.1.0
info:
  title: Plugin Test API
  version: 1.0.0
paths:
  /echo:
    get:
      operationId: echoGet
      summary: Echo a GET request
      responses:
        "200":
          description: Echo response
          content:
            application/json:
              schema:
                type: object
                properties:
                  method:
                    type: string
                  path:
                    type: string
    post:
      operationId: echoPost
      summary: Echo a POST request
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Echo response
          content:
            application/json:
              schema:
                type: object
  /echo/{id}:
    get:
      operationId: echoById
      summary: Echo a GET request with path param
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Echo response
          content:
            application/json:
              schema:
                type: object
