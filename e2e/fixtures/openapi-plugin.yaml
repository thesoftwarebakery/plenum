openapi: 3.1.0
info:
  title: Plugin Test API
  version: 1.0.0
paths:
  /echo:
    get:
      operationId: echoGet
      summary: Echo a GET request
      parameters:
        - name: message
          in: query
          schema:
            type: string
        - name: count
          in: query
          schema:
            type: integer
        - name: active
          in: query
          schema:
            type: boolean
        - name: tags
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: csv
          in: query
          style: form
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: spaced
          in: query
          style: spaceDelimited
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: piped
          in: query
          style: pipeDelimited
          explode: false
          schema:
            type: array
            items:
              type: string
        - name: filter
          in: query
          style: deepObject
          explode: true
          schema:
            type: object
      responses:
        "200":
          description: Echo response
          content:
            application/json:
              schema:
                type: object
                properties:
                  method:
                    type: string
                  path:
                    type: string
    post:
      operationId: echoPost
      summary: Echo a POST request
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Echo response
          content:
            application/json:
              schema:
                type: object
  /echo/{id}:
    get:
      operationId: echoById
      summary: Echo a GET request with path param
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Echo response
          content:
            application/json:
              schema:
                type: object
