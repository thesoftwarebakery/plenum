overlay: 1.1.0
info:
  title: Wire upstream to wiremock
  version: 1.0.0
actions:
  - target: $
    update:
      x-opengateway-upstreams:
        - name: "default"
          kind: "HTTP"
          address: "wiremock"
          port: 8080
  - target: $.paths[*]
    update:
      x-opengateway-upstream: "default"
