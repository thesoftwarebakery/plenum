overlay: 1.1.0
info:
  title: Wire upstream to wiremock (body test spec, buffered)
  version: 1.0.0
actions:
  - target: $
    update:
      x-opengateway-config:
        listen: "0.0.0.0:6188"
      x-opengateway-upstreams:
        default:
          kind: "HTTP"
          address: "wiremock"
          port: 8080
          buffer-response: true
  - target: $.paths[*]
    update:
      x-opengateway-upstream:
        $ref: "#/x-opengateway-upstreams/default"
