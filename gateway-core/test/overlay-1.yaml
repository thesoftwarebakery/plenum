overlay: 1.1.0
info:
  title: Fix up API description
  version: 1.0.1
actions:
  - target: $
    update:
      x-opengateway-config:
        threads: 2
        daemon: false
      x-opengateway-upstreams:
        default:
          kind: "HTTP"
          address: 0.0.0.0
          port: 8000
  - target: $.paths[*]
    update:
      x-opengateway-upstream:
        $ref: "#/x-opengateway-upstreams/default"
