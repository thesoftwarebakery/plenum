name: CI

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check-and-test:
    name: Check & Test
    runs-on: ubuntu-latest
    env:
      # brotli 3.x (pingora, ffi-api default) and brotli 6.x (deno_web, ffi-api
      # explicit) both export identical C FFI symbols. GNU ld rejects duplicates;
      # the symbols are functionally identical so picking either is safe.
      RUSTFLAGS: "-C link-args=-Wl,--allow-multiple-definition"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
          
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings
      
      - name: Run unit tests
        run: cargo test --workspace

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and load gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: opengateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Expose Docker over TCP (Deno Unix Socket workaround)
        run: |
          sudo apt-get update -y && sudo apt-get install -y socat
          sudo socat TCP-LISTEN:2375,fork,reuseaddr UNIX-CONNECT:/var/run/docker.sock &

      - name: Run E2E tests
        env:
          DOCKER_HOST: tcp://127.0.0.1:2375
        run: cd e2e && deno task test

      - name: Collect container logs on failure
        if: failure()
        run: |
          docker ps -a
          docker ps -a --filter "ancestor=opengateway:latest" -q | while read cid; do
            echo "=== Logs for $cid ==="
            docker logs "$cid" 2>&1
          done
