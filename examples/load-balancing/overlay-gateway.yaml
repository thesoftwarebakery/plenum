overlay: 1.1.0
info:
  title: Gateway with load balancing
  version: 1.0.0
actions:
  - target: $
    update:
      x-plenum-config:
        threads: 1
        listen: "0.0.0.0:6188"
      components:
        x-upstreams:
          pool:
            kind: "HTTP"
            selection: "round-robin"
            health-check:
              path: "/__admin/health"
              interval-seconds: 2
              consecutive-failure: 2
              consecutive-success: 1
            backends:
              - address: "backend-1"
                port: 8080
              - address: "backend-2"
                port: 8080
              - address: "backend-3"
                port: 8080
  - target: $.paths[*]
    update:
      x-plenum-upstream:
        $ref: "#/components/x-upstreams/pool"
