openapi: 3.1.0
info:
  title: Plugins Example
  version: 1.0.0
paths:
  /echo:
    get:
      operationId: echoGet
      parameters:
        - name: message
          in: query
          schema:
            type: string
        - name: count
          in: query
          schema:
            type: integer
        - name: tags
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
      responses:
        "200":
          description: Echo response
    post:
      operationId: echoPost
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Echo response
  /echo/{id}:
    get:
      operationId: echoById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Echo response with path param
