openapi: 3.1.0
info:
  title: Mock API
  description: A mock API that generates schema-compliant responses using json-schema-faker
  version: 1.0.0
paths:
  /users:
    get:
      operationId: listUsers
      summary: List users
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
  /users/{id}:
    get:
      operationId: getUser
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A single user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /products:
    get:
      operationId: listProducts
      summary: List products
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: A list of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
  /products/{id}:
    get:
      operationId: getProduct
      summary: Get a product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: A single product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
components:
  schemas:
    User:
      type: object
      required:
        - id
        - name
        - email
        - role
        - active
      properties:
        id:
          type: integer
          minimum: 1
          maximum: 10000
        name:
          type: string
          minLength: 3
          maxLength: 30
        email:
          type: string
          format: email
        role:
          type: string
          enum:
            - admin
            - editor
            - viewer
        active:
          type: boolean
    Product:
      type: object
      required:
        - id
        - title
        - price
        - category
        - inStock
      properties:
        id:
          type: integer
          minimum: 1
          maximum: 10000
        title:
          type: string
          minLength: 5
          maxLength: 50
        price:
          type: number
          minimum: 0.01
          maximum: 999.99
        category:
          type: string
          enum:
            - electronics
            - books
            - clothing
            - home
        inStock:
          type: boolean
