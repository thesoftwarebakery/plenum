services:
  gateway:
    image: ghcr.io/thesoftwarebakery/plenum
    ports:
      - "6188:6188"
    environment:
      SUPERTOKENS_URI: "http://supertokens:3567"
      API_KEY: "supertokens-example-api-key-2025"
    # Required for bubblewrap sandboxing — bwrap needs user namespaces which
    # are disabled on Docker Desktop. On Linux hosts, security_opt: [seccomp:unconfined]
    # may suffice instead. See #158 for details and alternative sandbox backends.
    privileged: true
    volumes:
      - ./:/config
    command:
      - --config-path=/config
      - --openapi-schema=openapi.yaml
      - --openapi-overlay=overlay-gateway.yaml,overlay-auth.yaml
    depends_on:
      supertokens:
        condition: service_healthy
      backend:
        condition: service_started

  supertokens:
    image: registry.supertokens.io/supertokens/supertokens-postgresql
    environment:
      API_KEYS: "supertokens-example-api-key-2025"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3567/hello"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: wiremock/wiremock:3x
    volumes:
      - ./wiremock:/home/wiremock
    command:
      - --global-response-templating
