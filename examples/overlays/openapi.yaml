openapi: 3.1.0
info:
  title: Overlays Example
  version: 1.0.0
paths:
  /products:
    get:
      operationId: listProducts
      responses:
        "200":
          description: List of products
  /products/{id}:
    get:
      operationId: getProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: A single product
  /internal/debug:
    get:
      operationId: debug
      responses:
        "200":
          description: Debug info
