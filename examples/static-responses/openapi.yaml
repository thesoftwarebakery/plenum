openapi: 3.1.0
info:
  title: Static Responses Example
  version: 1.0.0
paths:
  /health:
    get:
      operationId: healthCheck
      responses:
        "200":
          description: Health check
  /old-path:
    get:
      operationId: redirect
      responses:
        "301":
          description: Redirect
  /products:
    get:
      operationId: listProducts
      responses:
        "200":
          description: List of products
