overlay: 1.1.0
info:
  title: Gateway configuration with validation
  version: 1.0.0
actions:
  - target: $
    update:
      x-plenum-config:
        threads: 1
        listen: "0.0.0.0:6188"
      components:
        x-upstreams:
          default:
            kind: "HTTP"
            address: "backend"
            port: 8080
  - target: $.paths[*]
    update:
      x-plenum-upstream:
        $ref: "#/components/x-upstreams/default"
  - target: "$.paths['/items'].post"
    update:
      x-plenum-interceptor:
        - module: "internal:validate-request"
          hook: "on_request"
          function: "validateRequest"
