overlay: 1.1.0
info:
  title: Gateway configuration and upstream definitions
  version: 1.0.0
actions:
  - target: $
    update:
      x-plenum-config:
        threads: 1
        listen: "0.0.0.0:6188"
        request-timeout-ms: 5000
        on-gateway-error:
          module: "./dist/error-handler.js"
          function: onError
      components:
        x-upstreams:
          backend:
            kind: "HTTP"
            address: "backend"
            port: 8080
          db:
            kind: "plugin"
            plugin: "internal:postgres"
            options:
              host: "${{ env.DB_HOST }}"
              port: "${{ env.DB_PORT }}"
              database: "${{ env.DB_NAME }}"
              user: "${{ env.DB_USER }}"
              password: "${{ env.DB_PASSWORD }}"
            permissions:
              env: ["DB_HOST", "DB_PORT", "DB_NAME", "DB_USER", "DB_PASSWORD"]
          pool:
            kind: "HTTP"
            selection: "round-robin"
            backends:
              - address: "backend-pool-1"
                port: 8080
              - address: "backend-pool-2"
                port: 8080
            health-check:
              path: "/__admin/health"
              interval-seconds: 5
              consecutive-success: 1
              consecutive-failure: 2

  # Default upstream for product routes
  - target: $.paths['/products']
    update:
      x-plenum-upstream:
        $ref: "#/components/x-upstreams/backend"
  - target: $.paths['/products/{id}']
    update:
      x-plenum-upstream:
        $ref: "#/components/x-upstreams/backend"
