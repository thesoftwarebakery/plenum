services:
  gateway:
    image: ghcr.io/thesoftwarebakery/plenum
    ports:
      - "6188:6188"
    environment:
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "plenum"
      DB_USER: "plenum"
      DB_PASSWORD: "plenum"
    volumes:
      - ./:/config
    command:
      - --config-path=/config
      - --openapi-schema=openapi.yaml
      - --openapi-overlay=overlay-gateway.yaml,overlay-database.yaml
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: plenum
      POSTGRES_USER: plenum
      POSTGRES_PASSWORD: plenum
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plenum"]
      interval: 3s
      timeout: 3s
      retries: 10
