overlay: 1.1.0
info:
  title: Gateway and upstream configuration
  version: 1.0.0
actions:
  - target: $
    update:
      x-plenum-config:
        threads: 1
        listen: "0.0.0.0:6188"
      components:
        x-upstreams:
          db:
            kind: "plugin"
            plugin: "internal:postgres"
            options:
              host: "${{ env.DB_HOST }}"
              port: "${{ env.DB_PORT }}"
              database: "${{ env.DB_NAME }}"
              user: "${{ env.DB_USER }}"
              password: "${{ env.DB_PASSWORD }}"
            permissions:
              env: ["DB_HOST", "DB_PORT", "DB_NAME", "DB_USER", "DB_PASSWORD"]
  - target: $.paths[*]
    update:
      x-plenum-upstream:
        $ref: "#/components/x-upstreams/db"
